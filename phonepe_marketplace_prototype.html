<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhonePe Marketplace Prototype</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #3f3f3f; color: white; padding: 1rem; text-align: center; }
        .container { padding: 2rem; }
        .product { border: 1px solid #ccc; border-radius: 5px; padding: 1rem; margin: 1rem 0; }
        .button { background: #ff6f61; color: white; padding: 0.5rem 1rem; border: none; border-radius: 5px; cursor: pointer; }
        .button:hover { background: #ff4b3a; }
    </style>
</head>
<body>
    <header>
        <h1>PhonePe Marketplace</h1>
    </header>
    <div class="container">
        <h2>Featured Products</h2>
        <div class="product">
            <h3>Product 1</h3>
            <p>Description of product 1.</p>
            <button class="button">Add to Cart</button>
        </div>
        <div class="product">
            <h3>Product 2</h3>
            <p>Description of product 2.</p>
            <button class="button">Add to Cart</button>
        </div>
    </div>
</body>
</html>
